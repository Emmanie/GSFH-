<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b3b6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5a9e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#grad1)"/>
  
  <!-- Icône communauté (personnes) -->
  <g transform="translate(600, 350)">
    <circle cx="-60" cy="0" r="35" fill="rgba(255,255,255,0.3)"/>
    <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.3)"/>
    <circle cx="60" cy="0" r="35" fill="rgba(255,255,255,0.3)"/>
    <path d="M -90 50 Q -60 30 -30 50 L -30 80 L -90 80 Z" fill="rgba(255,255,255,0.3)"/>
    <path d="M -30 50 Q 0 30 30 50 L 30 80 L -30 80 Z" fill="rgba(255,255,255,0.3)"/>
    <path d="M 30 50 Q 60 30 90 50 L 90 80 L 30 80 Z" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Texte -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Actions Communautaires</text>
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">GSFH - Groupe de Soutien pour la Fraternite Haitienne</text>
  <text x="600" y="650" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)" text-anchor="middle">Solidarite • Fraternite • Developpement</text>
</svg>
