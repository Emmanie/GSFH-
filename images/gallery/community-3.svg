    <line x1="-70" y1="35" x2="50" y2="35" stroke="rgba(255,255,255,0.5)" stroke-width="4"/>
  </g>
  
  <!-- Texte -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Rencontre Communautaire</text>
