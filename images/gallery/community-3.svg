<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d7ac7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b3b6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#grad3)"/>
  
  <!-- Icône dialogue/rencontre -->
